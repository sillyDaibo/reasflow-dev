**Strong Accept:**
- [ ] Parameters embedded in rationale-driven prose (not lists)
- [ ] Every figure validates a specific theorem/lemma number
- [ ] Ablations isolate causal mechanisms with theory citations
- [ ] Main body lean, logistics in Appendix
- [ ] Perfect symbol consistency between Method and Experiments

**Weak Reject triggers — fix before delivering:**
- [ ] Shopping-list parameter enumeration
- [ ] "Our method is better" without causal attribution
- [ ] GPU specs / pip install in main body
- [ ] No theory loop-closing (no theorem/lemma references in Results)
- [ ] Captions that only name the figure instead of stating the takeaway

---

Core mission: transform Markdown into a courtroom argument with data, not a code execution log.
- ❌ DON'T list parameters and results
- ✅ DO construct logical arguments supported by data with theory anchors
- ❌ DON'T say "We tested X, Y, Z"
- ✅ DO say "To validate theory X, we designed experiment Y, and result Z confirms Theorem~N"
