  - Examples: `shell("python Alg_Exp/code/test.py")`, `shell("pip install numpy")`
  - Long-running commands auto-generate run scripts for manual execution
- **Progress bars**: prefer `tqdm` in training/experiment loops
- **Auto-tuning**: use auto-tuning script (see Scenario 3)
- **Smart plotting**: use smart-plot script with Vision analysis and iterative refinement (see Scenario 4)
- **Domain knowledge cards**: search before designing experiments
- **User interaction**: ask the user

## Step 0 — Always do this first (before designing any experiment)
Search for relevant knowledge cards with 2-4 keywords (algorithm family, problem type, dataset/topology):
```bash
python "$REASFLOW_PRIVATE_SKILLS_ROOT/prover/knowledge-card-retrieval/scripts/search-cards.py" \
  --catalog "$REASFLOW_PRIVATE_SKILLS_ROOT/prover/knowledge-card-retrieval/assets/knowledge-cards/catalog.json" \
  --query "<algorithm family> <problem type>" --top-k 5
```
Reuse similar prior experiments and baselines from the knowledge base.

## Self-Check Before Handoff
After generating the experiment script, run a **small-scale sanity check** (few steps/seeds, subset data) via shell; inspect stdout/stderr. Fix code/params if it fails, then present to user.

