## Scenario 0: Formal Comparisons on Standard Tasks (Main Paper Evidence)

For main conclusions, enforce:
- **Recognized & reproducible protocols**: mainstream datasets/tasks; fixed splits, preprocessing, metrics, stop criteria; provide configs/scripts.
- **Multiple seeds**: fixed seed set; report mean ± std (CI when needed).
- **Baselines with defensible coverage**:
  - Classic: historical/standard methods
  - Strong: widely used, mature implementations
  - Same-paradigm: closest assumptions/structure
  - Resource-fair: strongest under equal compute/comm/params
- **Consistency/fairness**: same split/preprocess/metrics/seeds; tuning uses public defaults or equal search budgets; if added cost, report cost-benefit explicitly.
- **Metrics tied to claims**: convergence speed, communication cost, compute cost/time, memory, heterogeneity sensitivity, stability/reproducibility across seeds.
- **Presentation**:
  - Main table: standard task comparison (mean ± std, CI if relevant)
  - Main curves: error vs iterations/communication rounds/time
  - Main sweeps: key factors (heterogeneity/topology/noise) systematic curves
- **Artifacts**:
  - Unified configs/scripts under Alg_Exp/code/, Alg_Exp/config/ (YAML/JSON) plus run scripts (.sh/.bat)
  - Aggregated results in Alg_Exp/data/results.csv (seed, method, metrics, cost)
  - Figures in Alg_Exp/picture/*.png (paper quality)
  - Report in Alg_Exp/document/experiment_report.md with protocol, baselines, seeds, metrics, table/figure paths, cost/benefit, conclusions

## Scenario 1: Simple Validation Experiment

1. **Understand the need**: Read algorithm code (Alg_Exp/code/algorithm.py), confirm experiment goal.
2. **Design plan**:
   ```
   Experiment type: validation
   Dataset: linear regression (sklearn generated)
   Metrics: MSE, convergence rounds
   Config: 3 random seeds
   ```
   Write to Alg_Exp/document/plan.md.
3. **Confirm plan** with user before executing.
4. **Execute**:
   - Install: `pip install numpy scipy matplotlib`
   - Run: `python Alg_Exp/code/experiment.py`
   - Save results to Alg_Exp/data/results.csv
5. **Show results** and ask user for next step.

## Scenario 2: Comparison Experiment

1. Design comparison plan (multiple algorithms)
2. Confirm plan with user
3. Batch execute all configurations
4. Aggregate results to one CSV
5. Show comparison results (table)
6. Ask if user wants to plot

## Scenario 3: Hyperparameter Tuning

**MUST use auto-tuning script. Do NOT manually try parameters.**

1. Define objective function in Alg_Exp/code/tuning_experiment.py:
```python
def objective_for_tuning(params: dict) -> float:
    \"\"\"
    Args:
        params: parameter dict, e.g. {"learning_rate": 0.01, "momentum": 0.9}
    Returns:
        value to optimize (float)
        - minimize: return loss, error rate, etc.
        - maximize: return -accuracy, etc.
    \"\"\"
    result = run_experiment_with_params(params)
    return -result['test_accuracy']
```

2. Design tuning plan (parameter search space)
3. Confirm plan with user
4. Run auto-tuning:
```bash
python "$SKILL_ROOT_TUNE/scripts/optuna-search.py" \
  --experiment-file Alg_Exp/code/tuning_experiment.py \
  --objective-function objective_for_tuning \
  --param-space-file Alg_Exp/document/param_space.json \
  --direction minimize --trials 50 \
  --output Alg_Exp/data/tuning_results.json
```

5. Show best parameters and performance
6. Ask if user wants to rerun with best params

## Scenario 4: Publication-Quality Figure Generation

**MUST use smart-plot script. Do NOT write matplotlib code directly.**

```bash
python "$SKILL_ROOT_PLOT/scripts/smart-plot.py" \
  --request "Convergence curves: X=iteration, Y=MSE log-scale, compare methods A B C, show mean±std shading, 14pt font, DPI 300" \
  --data-sources Alg_Exp/data/results.csv \
  --output Alg_Exp/picture/convergence.png \
  --auto-analyze --max-iterations 3
```

This auto-generates matplotlib code, executes it, uses Vision analysis to score quality (target ≥ 8.5), and iterates automatically.
- If Vision score < 8.5 and --auto-analyze is set, the script iterates automatically
- If user is not satisfied, pass feedback to the script and rerun

# Key Implementation Details

## 1. Virtual Environment Usage (Important!)

**⚠️ Key: Use standard `python` and `pip` — the tool automatically selects the .venv version**

```python
# ✅ Correct: Use standard commands, shell handles it
shell("pip install numpy scipy matplotlib torch")
# → Automatically uses: .venv/bin/pip install ... (Linux/macOS)
# → Or: .venv\Scripts\pip.exe install ... (Windows)

shell("python Alg_Exp/code/experiment.py")
# → Automatically uses: .venv/bin/python ... (Linux/macOS)
# → Or: .venv\Scripts\python.exe ... (Windows)

# ❌ Wrong: Don't manually specify venv paths
shell(".venv/bin/python Alg_Exp/code/experiment.py")  # ❌ Fails on Windows!
```

**How it works**: shell detects `<workspace>/.venv`, automatically replaces `python` and `pip install` with the venv version, cross-platform.

Just use:
```python
# Install dependencies
shell("pip install numpy torch torchvision")

# Run experiment
shell("python Alg_Exp/code/experiment.py")

# Check installed packages
shell("pip list")
```

## 2. Experiment Code Template

```python
import numpy as np
from algorithm import YourAlgorithm

def run_experiment(config):
    X, y = load_data(config['dataset'])
    algo = YourAlgorithm(**config['params'])
    result = algo.optimize(X, y)
    return {'mse': result['mse'], 'rounds': result['rounds'], 'time': result['time']}

results = []
for seed in [0, 1, 2]:
    for lr in [0.01, 0.1]:
        config = {'params': {'lr': lr}, 'dataset': 'linear', 'seed': seed}
        np.random.seed(seed)
        result = run_experiment(config)
        result.update({'seed': seed, 'lr': lr})
        results.append(result)

import pandas as pd
pd.DataFrame(results).to_csv('Alg_Exp/data/results.csv', index=False)
```

## 3. Result Display Format

```
Experiment complete!

Config:
- Algorithm: YourAlgorithm
- Dataset: Linear Regression (1000 samples)
- Random seeds: 3

Results (mean ± std):
- MSE: 0.023 ± 0.005
- Convergence rounds: 45 ± 3
- Runtime: 1.2s ± 0.1s

Data saved to: Alg_Exp/data/results.csv
```

## 4. Error Handling

If experiment fails:
1. Read error message
2. Diagnose: missing dependency? code bug? bad parameters?
3. Fix:
   - Missing dependency → `pip install <package>`
   - Code bug → fix the code
   - Bad parameters → adjust
4. Rerun: `python Alg_Exp/code/experiment.py`
5. If fails repeatedly, report to user

