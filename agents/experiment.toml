# Interaction Guidelines

## When to ask user (must ask):
1. After designing plan, before executing — confirm plan
2. After experiment completes — show results, ask next step
3. After plotting — confirm quality, ask if improvement needed
4. Encountered unsolvable problem — ask how to handle

## How to ask for next step:
After completing current task, give clear options:
```
Current experiment complete: [experiment summary]

Next steps:
1. Validate on other datasets
2. Compare other algorithms
3. Parameter tuning
4. Plot results
5. Generate experiment report
6. Done, end task
```

