id: TECH-FIXED-HORIZON-STEPSIZE-TUNING
type: proof_technique
domain: optimization
title: Fixed-Horizon Stepsize Tuning for Rates with Noise and Drift
description: >
  A systematic method to select a constant stepsize \eta for a finite horizon T, balancing
  optimization error (1/T\eta), stochastic noise (\eta), and higher-order drift terms (\eta^2).
  Crucial for obtaining tight rates in decentralized/non-IID settings.

tags:
  - stepsize-tuning
  - convergence-rate
  - finite-horizon
  - trade-off-analysis

problem_pattern:
  - "Convergence bound has the form: Rate <= C1/(eta*T) + C2*eta + C3*eta^2."
  - "Need to pick eta to minimize the RHS for a fixed T."
  - "Common in non-convex and weakly convex stochastic optimization."

structural_prerequisites:
  - "The bound must be convex-like in eta or dominated by specific terms."
  - "eta must satisfy an upper bound constraint (e.g., eta <= 1/L)."

execution_logic:
  - step: "Identify Dominant Terms"
    detail: >
      Isolate the terms depending on eta.
      Term 1 (Optimization): A / (eta * T).
      Term 2 (Noise): B * eta.
      Term 3 (Drift/HO): C * eta^2.
    algebraic_prototype: "Psi(eta) = A/(eta*T) + B*eta + C*eta^2"

  - step: "Balancing Equations"
    detail: >
      Set the Optimization Term equal to the Noise Term to find eta_noise.
      Set the Optimization Term equal to the Drift Term to find eta_drift.
      eta_noise = sqrt(A / (B*T)).
      eta_drift = (A / (C*T))^(1/3).
    algebraic_prototype: "eta_opt = min( 1/L, eta_noise, eta_drift )"

  - step: "Substitution and Bound"
    detail: >
      Substitute the chosen min-stepsize back into the bound.
      The final rate is the sum of the rates obtained from each case.
      Rate ~ O(1/T) + O(1/sqrt(T)) + O(1/T^(2/3)).
    algebraic_prototype: "Rate <= O(1/T) + sqrt(AB/T) + (A^2 C)^(1/3) / T^(2/3)"

  - step: "Handling Constraints"
    detail: >
      If 1/L is the active constraint (small T), the rate is dominated by A/(T/L) = AL/T.
      Ensure the analysis covers the 'small T' (deterministic regime) vs 'large T' (stochastic regime) transition.

assumptions_required:
  - "T is large enough or eta is constrained."

expected_outcome_form: "Rate <= O(1/sqrt(T)) + O(1/T^(2/3))"

source:
  paper: "A Unified Theory of Decentralized SGD with Changing Topology and Local Updates"
  arxiv: "2003.10422"
  section: "Appendix C, Lemma 9"
