id: TECH-PRIMAL-DUAL-EQUIVALENCE-MAPPING
type: proof_technique
domain: optimization

title: Primal-Dual Algorithm Equivalence Mapping
description: Proves convergence of a Primal-Dual algorithm (e.g., ADMM) by establishing a linear bijection to a known Operator Splitting algorithm (e.g., Douglas-Rachford) and inheriting its convergence guarantees.

problem_pattern:
  - "Need to prove convergence for a Primal-Dual algorithm (like FedADMM) without re-deriving all bounds."
  - "The algorithm structure resembles a known Operator Splitting method (DRS, Peaceman-Rachford) applied to the dual problem."
  - "The algorithm involves primal variables, dual variables, and auxiliary variables that interact linearly."

structural_prerequisites:
  - "The Primal-Dual algorithm must be a direct application of the Operator Splitting method to the dual formulation (or a slight variant)."
  - "There must be a clear correspondence between the update steps of both algorithms (e.g., prox-evaluations match)."
  - "The participation model (e.g., partial participation sampling) must be identical in both algorithms."

execution_logic:
  - step: "Variable Transformation Definition"
    detail: "Define a linear bijection mapping variables from the Target Algorithm (ADMM) to the Reference Algorithm (DRS). This typically involves scaling by the penalty parameter."
    dependency_check: "Ensure the mapping is invertible."
    algebraic_prototype: "s_i = x_i - z_i / eta;  u_i = x_i;  hat_u_i = x_i + z_i / eta"

  - step: "Step-by-Step Update Verification"
    detail: "Substitute the variable definitions into the Reference Algorithm's update rules and verify they algebraically simplify to the Target Algorithm's update rules."
    dependency_check: "Must hold for both active and inactive clients (in partial participation settings)."
    algebraic_prototype: "u_{new} = prox(s_{new}) <=> x_{new} = argmin(Lagrangian)"

  - step: "Global Aggregation Consistency"
    detail: "Verify that the global aggregation step (e.g., averaging) in the Reference Algorithm maps correctly to the dual/global update in the Target Algorithm."
    algebraic_prototype: "v_{new} = prox(mean(hat_u)) <=> x_bar_{new} = prox(mean(x + z/eta))"

assumptions_required:
  - "Equivalence of the underlying optimization problem formulations (Primal vs. Dual)."
  - "Identical initialization or initialization that satisfies the mapping."
  - "Same random sampling realization for stochastic/partial participation."

expected_outcome_form: "Exact algebraic identity between the sequences generated by both algorithms, allowing direct transfer of convergence rates (e.g., O(1/k))."

source:
  paper: "FedADMM: A Federated Primal-Dual Algorithm Allowing Partial Participation"
  arxiv: "2203.15104"
  section: "Theorem 1"

tags:
  - primal-dual
  - operator-splitting
  - equivalence-proof
  - admm
  - douglas-rachford
